<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pathfinder Sumatera — Perbandingan Algoritma AI</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-50">
  <div class="container" x-data="pathfinderApp()" x-init="initMap()">
    
    <header>
      <div class="header-eyebrow">Tugas Besar · Kecerdasan Buatan</div>
      <h1>Pathfinder Sumatera</h1>
      <p>Perbandingan algoritma DFS, A*, dan Hill Climbing untuk pencarian rute darat antar kota di Sumatera.</p>
    </header>

    <div class="layout-wrapper">
      
      <div class="left-col">
        <div class="card">
          <div class="controls-row">
            
            <div class="control-group">
              <label>Kota asal</label>
              <select x-model="startCity" @change="clearResults()">
                <template x-for="city in Object.keys(NODES)" :key="city">
                  <option :value="city" x-text="city"></option>
                </template>
              </select>
            </div>
            
            <div class="control-group">
              <label>Kota tujuan</label>
              <select x-model="goalCity" @change="clearResults()">
                <template x-for="city in Object.keys(NODES)" :key="city">
                  <option :value="city" x-text="city" :selected="city === 'Pekanbaru'"></option>
                </template>
              </select>
            </div>

            <div class="control-group">
              <label>Optimasi</label>
              <select x-model="mode" @change="clearResults()">
                <option value="dist">Jarak (km)</option>
                <option value="time">Waktu (menit)</option>
              </select>
            </div>
          </div>
          
          <div class="tabs">
            <button class="tab-btn" :class="activeTab === 'compare' ? 'active' : ''" @click="setTab('compare')">Semua Algoritma</button>
            <button class="tab-btn" :class="activeTab === 'dfs' ? 'active' : ''" @click="setTab('dfs')">DFS</button>
            <button class="tab-btn" :class="activeTab === 'astar' ? 'active' : ''" @click="setTab('astar')">A*</button>
            <button class="tab-btn" :class="activeTab === 'hc' ? 'active' : ''" @click="setTab('hc')">Hill Climbing</button>
          </div>
          <button class="run-btn" @click="runAll()">Jalankan Algoritma</button>

          <div class="canvas-wrap">
            <div x-ref="mapDiv" id="map" style="width: 100%; height: 380px; border-radius: 8px;"></div>
          </div>

          <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#1D9E75"></div>Start / Goal</div>
            <div class="legend-item"><div class="legend-dot" style="background:#378ADD"></div>DFS</div>
            <div class="legend-item"><div class="legend-dot" style="background:#EF9F27"></div>A*</div>
            <div class="legend-item"><div class="legend-dot" style="background:#D85A30"></div>Hill Climbing</div>
          </div>
        </div>
      </div>

      <div class="right-col">
        <div class="section-title">Hasil Pencarian</div>
        
        <div class="result-grid">
          <template x-if="hasRun">
            <div style="display: contents;">
              <template x-for="k in visibleAlgos" :key="k">
                <div class="res-card" :class="{'best': results[k].found && results[k].weight === bestWeight, 'failed': !results[k].found}">
                  
                  <div class="res-algo-label" :style="`color:${algoMeta[k].color}`">
                    <span x-text="algoMeta[k].label"></span>
                    <template x-if="results[k].found && results[k].weight === bestWeight">
                      <span class="badge-best">Paling Optimal</span>
                    </template>
                    <template x-if="!results[k].found">
                      <span class="badge-fail">Gagal</span>
                    </template>
                  </div>
                  
                  <div class="res-dist" style="font-size: 20px;">
                    <template x-if="results[k].found">
                      <div>
                        <span x-text="results[k].dist.toLocaleString() + ' km'"></span> <br>
                        <span style="font-size:14px; color:var(--muted)">⏱️ <span x-text="formatTimeStr(results[k].time)"></span></span>
                      </div>
                    </template>
                    <template x-if="!results[k].found"><span>—</span></template>
                  </div>
                  
                  <div class="res-meta" x-text="`${results[k].explored} node · ${results[k].timeMs} ms`"></div>
                  
                  <div class="res-path" x-text="results[k].found ? formatPathStr(results[k].path) : (results[k].stuckAt ? 'Terjebak di: ' + results[k].stuckAt : 'Tidak ditemukan')"></div>
                </div>
              </template>
            </div>
          </template>
        </div>

        <div class="section-title" style="margin-top: 1rem;">Info Panel</div>
        <div class="info-panel" x-html="infoText"></div>
      </div>

    </div>
  </div>

  <script src="data/graph.js"></script>
  <script src="data/utils.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="algoritma/dfs.js"></script>
  <script src="algoritma/astar.js"></script>
  <script src="algoritma/hillclimbing.js"></script>

  <script>
    const ALGO_META = {
      dfs: { label: "DFS", color: "#378ADD", dash: "6, 4", width: 3, desc: `<b>Depth-First Search (DFS)</b> adalah algoritma pencarian buta (uninformed). Ia akan terus menyusuri satu rute sedalam mungkin sampai mentok sebelum mencoba rute lain.` },
      astar: { label: "A*", color: "#EF9F27", dash: null, width: 4, desc: `<b>A* Search</b> adalah algoritma cerdas (informed). Ia menggabungkan jarak yang sudah ditempuh dengan estimasi sisa jarak (Haversine) untuk selalu memilih rute paling masuk akal.` },
      hc: { label: "Hill Climbing", color: "#D85A30", dash: "3, 3", width: 3, desc: `<b>Hill Climbing</b> adalah algoritma lokal yang agresif. Ia selalu memilih kota tetangga yang posisinya paling dekat dengan tujuan akhir, sehingga sering terjebak di jalan buntu.` },
    };

    document.addEventListener('alpine:init', () => {
      Alpine.data('pathfinderApp', () => ({
        // State UI
        startCity: 'Medan',
        goalCity: 'Pekanbaru',
        mode: 'dist',
        activeTab: 'compare',
        hasRun: false,
        results: {},
        nodesCount: Object.keys(NODES).length,
        edgesCount: EDGES.length,

        // State Map
        map: null,
        baseLayers: null,
        animLayers: null,
        animProgress: 1,
        animReq: null,

        // Properti Komputasi (Getter)
        get bestWeight() {
          if (!this.hasRun) return Infinity;
          const keys = ["dfs", "astar", "hc"];
          return Math.min(...keys.filter(k => this.results[k]?.found).map(k => this.results[k].weight));
        },
        get visibleAlgos() {
          return this.activeTab === 'compare' ? ['dfs', 'astar', 'hc'] : [this.activeTab];
        },
        get algoMeta() { return ALGO_META; },
        get infoText() {
          const texts = {
            dfs: ALGO_META.dfs.desc,
            astar: ALGO_META.astar.desc,
            hc: ALGO_META.hc.desc,
            compare: !this.hasRun 
              ? `Graf rute darat <b>${this.nodesCount} kota</b> dan <b>${this.edgesCount} ruas jalan</b>. Pilih kota dan klik <b>Jalankan Algoritma</b>.`
              : `Mode <b>Semua Algoritma</b>: Menampilkan semua jalur sekaligus. Solid tebal = A*, putus panjang = DFS, putus pendek = Hill Climbing.`
          };
          return texts[this.activeTab] || texts.compare;
        },

        // Helper untuk template HTML
        formatPathStr(path) { return formatPath(path); },
        formatTimeStr(mins) { return formatTime(mins); },

        // Inisialisasi Peta Leaflet
        initMap() {
          this.map = L.map(this.$refs.mapDiv).setView([1.8, 100.0], 7);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
          }).addTo(this.map);

          this.baseLayers = L.layerGroup().addTo(this.map);
          this.animLayers = L.layerGroup().addTo(this.map);

          this.drawBaseMap();
          this.drawAnimMap();
        },

        // Gambar Statis Peta Dasar (1x saja)
        drawBaseMap() {
          this.baseLayers.clearLayers();
          for (const [a, b, w] of EDGES) { 
            const latlngs = [[NODES[a].lat, NODES[a].lon], [NODES[b].lat, NODES[b].lon]];
            L.polyline(latlngs, { color: "rgba(140,140,140,0.4)", weight: 1.5 }).addTo(this.baseLayers);

            const midLat = (NODES[a].lat + NODES[b].lat) / 2;
            const midLon = (NODES[a].lon + NODES[b].lon) / 2;
            L.tooltip({ permanent: true, direction: 'center', className: 'edge-label', interactive: false })
              .setLatLng([midLat, midLon]).setContent(`${w} km`).addTo(this.baseLayers);
          }

          for (const name in NODES) { 
            const coords = [NODES[name].lat, NODES[name].lon];
            const marker = L.circleMarker(coords, {
              radius: 5, fillColor: "#ffffff", color: "rgba(100,100,100,0.35)", weight: 1.5, fillOpacity: 1
            }).addTo(this.baseLayers);
            marker.bindTooltip(name, {
              permanent: true, direction: "top", className: 'city-label', offset: [0, -8]
            });
          }
        },

        // Event saat ubah pilihan (Tab & Dropdown)
        clearResults() {
          this.hasRun = false;
          this.results = {};
          if (this.animLayers) this.animLayers.clearLayers();
        },

        setTab(tab) {
          this.activeTab = tab; // Tidak ada lagi alert! Bebas klik!
          if (this.hasRun) this.startAnimation(); // Cuma jalan kalau udah pernah klik Run
        },

        // Algoritma Induk
        runAll() {
          if (this.startCity === this.goalCity) {
            alert("Pilih kota asal dan tujuan yang berbeda ya!");
            return;
          }

          const currentAdj = buildAdjacency(this.mode);
          const currentHeuristic = this.mode === "time" ? haversineTime : haversine;

          const keys = ["dfs", "astar", "hc"];
          const fns = [dfs, astar, hillClimbing];
          const newResults = {};

          for (let i = 0; i < keys.length; i++) {
            let t = performance.now();
            // A* dan HC butuh NODES dan Heuristic, DFS tidak
            let res = (keys[i] === "dfs") 
              ? fns[i](this.startCity, this.goalCity, currentAdj) 
              : fns[i](this.startCity, this.goalCity, currentAdj, NODES, currentHeuristic);
            
            res.timeMs = (performance.now() - t).toFixed(3);
            let stats = calculatePathStats(res.path);
            res.dist = stats.dist;
            res.time = stats.time;
            res.weight = this.mode === "time" ? stats.time : stats.dist;
            
            newResults[keys[i]] = res;
          }

          this.results = newResults;
          this.hasRun = true;
          this.startAnimation();
        },

        // Mesin Animasi Leaflet
        startAnimation() {
          this.animProgress = 0;
          if (this.animReq) cancelAnimationFrame(this.animReq);
          
          const step = () => {
            this.animProgress += 0.008;
            if (this.animProgress > 1) this.animProgress = 1;
            this.drawAnimMap();
            if (this.animProgress < 1) {
              this.animReq = requestAnimationFrame(step);
            }
          };
          step();
        },

        drawAnimMap() {
          if (!this.map || !this.animLayers) return;
          this.animLayers.clearLayers();

          const toHighlight = this.activeTab === "compare" ? ["dfs", "astar", "hc"] : (ALGO_META[this.activeTab] ? [this.activeTab] : []);
          const reachedNodes = new Set();

          for (const key of toHighlight) { 
            const r = this.results[key]; 
            if (!r || !r.path.length) continue; 
            const m = ALGO_META[key]; 
            
            const totalSegments = r.path.length - 1; 
            const currentTotalProgress = this.animProgress * totalSegments; 
            const currentSegmentIndex = Math.floor(currentTotalProgress); 
            const segmentProgress = currentTotalProgress - currentSegmentIndex; 

            const currentPathCoords = [];

            for (let i = 0; i <= currentSegmentIndex && i < r.path.length; i++) {
              currentPathCoords.push([NODES[r.path[i]].lat, NODES[r.path[i]].lon]);
              reachedNodes.add(r.path[i]); 
            }

            if (currentSegmentIndex < totalSegments) {
              const nodeA = NODES[r.path[currentSegmentIndex]];
              const nodeB = NODES[r.path[currentSegmentIndex + 1]];
              const currentLat = nodeA.lat + (nodeB.lat - nodeA.lat) * segmentProgress;
              const currentLon = nodeA.lon + (nodeB.lon - nodeA.lon) * segmentProgress;
              currentPathCoords.push([currentLat, currentLon]);

              if (this.animProgress < 1) {
                L.circleMarker([currentLat, currentLon], {
                  radius: Math.max(m.width * 1.5, 5), fillColor: m.color, color: m.color, fillOpacity: 1
                }).addTo(this.animLayers);
              }
            }

            if (currentPathCoords.length > 1) {
              L.polyline(currentPathCoords, { color: m.color, weight: m.width, dashArray: m.dash }).addTo(this.animLayers);
            }
          }

          const dynamicColor = ALGO_META[this.activeTab] ? ALGO_META[this.activeTab].color : "#1d4ed8";

          for (const name of reachedNodes) {
            const isKey = name === this.startCity || name === this.goalCity;
            if (isKey) continue;
            
            L.circleMarker([NODES[name].lat, NODES[name].lon], {
              radius: 6.5, fillColor: dynamicColor, color: "#1e40af", weight: 1, fillOpacity: 1
            }).addTo(this.animLayers);
          }

          for (const name of [this.startCity, this.goalCity]) {
            if (!NODES[name]) continue;
            L.circleMarker([NODES[name].lat, NODES[name].lon], {
              radius: 8, fillColor: "#1D9E75", color: "#0F6E56", weight: 2, fillOpacity: 1
            }).addTo(this.animLayers);
          }
        }

      }));
    });
  </script>
</body>
</html>
